<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SONAS--GameDev</title>
<link rel="icon" href="https://thestarofnorthafrica.github.io/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --bg2: #0f0f1a;
  --bg3: #14141f;
  --accent: #00f5c4;
  --accent2: #7c3aed;
  --accent3: #f59e0b;
  --text: #e2e8f0;
  --muted: #64748b;
  --border: rgba(0, 245, 196, 0.15);
  --glow: 0 0 20px rgba(0, 245, 196, 0.3);
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  line-height: 1.7;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events: none;
  z-index: 9999;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: linear-gradient(rgba(0,245,196,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,245,196,0.03) 1px, transparent 1px);
  background-size: 50px 50px;
  pointer-events: none;
  z-index: 0;
}

nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 1rem 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(10,10,15,0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}

.nav-logo {
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: 1.1rem;
  color: var(--accent);
  text-decoration: none;
  letter-spacing: 2px;
}

.nav-logo span { color: var(--accent2); }

nav ul { list-style: none; display: flex; gap: 2rem; }

nav a {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.85rem;
  color: var(--muted);
  text-decoration: none;
  letter-spacing: 1px;
  transition: color 0.2s;
}

nav a:hover { color: var(--accent); }

/* ================= ROTATE POPUP ================= */
#rotate-popup {
  position: fixed;
  inset: 0;
  background: rgba(10,10,15,0.95);
  backdrop-filter: blur(10px);
  z-index: 10000;
  display: none;
  align-items: center;
  justify-content: center;
}

.rotate-box {
  border: 1px solid var(--border);
  padding: 1.5rem 2rem;
  background: var(--bg2);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.85rem;
  letter-spacing: 2px;
  color: var(--accent);
  text-align: center;
  box-shadow: var(--glow);
}
/* ================================================= */

.hero {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  align-items: center;
  padding: 6rem 2rem 4rem;
  max-width: 1100px;
  margin: 0 auto;
}

.hero-content { max-width: 700px; }

.hero-tag {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.8rem;
  color: var(--accent);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.hero-tag::before {
  content: '';
  width: 24px;
  height: 1px;
  background: var(--accent);
}

h1 {
  font-family: 'Orbitron', monospace;
  font-size: clamp(2.5rem, 6vw, 4.5rem);
  font-weight: 900;
  line-height: 1.1;
  margin-bottom: 1.5rem;
}

.hero-desc {
  font-size: 1.1rem;
  color: var(--muted);
  margin-bottom: 2.5rem;
}

.hero-btns { display: flex; gap: 1rem; flex-wrap: wrap; }

/* (rest unchanged visually) */
section { padding: 5rem 2rem; max-width: 1100px; margin: 0 auto; }

footer {
  border-top: 1px solid var(--border);
  padding: 2rem;
  text-align: center;
}

footer p {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.75rem;
  color: var(--muted);
}

footer span { color: var(--accent); }
</style>
</head>

<body>

<!-- ROTATE POPUP -->
<div id="rotate-popup">
  <div class="rotate-box">
    rotate your device for a better experience
  </div>
</div>

<nav>
  <a href="#" class="nav-logo">TheStarOf<span>NorthAfrica-Studios [SONAS]</span></a>
  <ul>
    <li><a href="#games">games</a></li>
    <li><a href="#about">about</a></li>
  </ul>
</nav>

<div class="hero">
  <div class="hero-content">
    <div class="hero-tag">indie game developer</div>
    <h1>Making games<br>for <span style="color:var(--accent)">everyone</span></h1>
    <p class="hero-desc">
      Hi, I'm <strong>SpectralGlitch</strong> — a self-taught game dev from <strong>Algeria 🇩🇿</strong>.
    </p>
    <div class="hero-btns">
      <a href="#games" class="btn btn-primary">View games</a>
    </div>
  </div>
</div>

<footer>
  <p>Built with 💚 by <span>SpectralGlitch</span></p>
</footer>

<script>
function checkOrientation() {
  const popup = document.getElementById("rotate-popup");
  const isMobile = window.innerWidth <= 768;

  if (isMobile && window.innerHeight > window.innerWidth) {
    popup.style.display = "flex";
  } else {
    popup.style.display = "none";
  }
}

window.addEventListener("load", checkOrientation);
window.addEventListener("resize", checkOrientation);
</script>

</body>
</html>
